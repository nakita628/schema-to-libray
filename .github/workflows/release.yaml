name: release

on:
  workflow_run:
    workflows: [deploy]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check published and untagged version
        id: ver
        run: |
          CUR=$(jq -r .version packages/schema-to-library/package.json)
          npm view "schema-to-library@$CUR" version >/dev/null 2>&1 || { echo "schema-to-library@$CUR is not published to npm; skip release"; exit 0; }
          git fetch --tags --depth=1 --quiet origin "refs/tags/v$CUR" 2>/dev/null || true
          git rev-parse -q --verify "refs/tags/v$CUR" >/dev/null || echo "version=$CUR" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.ver.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TARGET: ${{ github.event.workflow_run.head_sha }}
        run: gh release create "v$VERSION" --generate-notes --target "$TARGET"
