name: release

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version change
        id: ver
        run: |
          CUR=$(jq -r .version packages/schema-to-library/package.json)
          git fetch --tags --depth=1 --quiet origin "refs/tags/v$CUR" 2>/dev/null || true
          git rev-parse -q --verify "refs/tags/v$CUR" >/dev/null || echo "version=$CUR" >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.ver.outputs.version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: gh release create "v$VERSION" --generate-notes

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - run: vp install

      - run: vp run schema-to-library#build

      - run: npm install -g npm@latest

      - run: npm publish
        working-directory: packages/schema-to-library
